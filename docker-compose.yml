services:
  ozon-bot:
    build: .
    container_name: ozon-bot
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Europe/Moscow
    volumes:
      - ./data:/data

    # --- Лимиты ресурсов (1.2 ГБ RAM, ~1.5 CPU, ограничение PID) ---
    mem_limit: 1200m
    memswap_limit: 1200m   # swap отключён, контейнер не сможет «вылезти» в своп
    mem_reservation: 512m
    cpus: 1.5
    pids_limit: 512
    oom_kill_disable: false

    # --- Лимит размера на запись внутри контейнера (~3 ГБ) ---
    # storage_opt.size работает ТОЛЬКО на overlay2 поверх xfs с опцией pquota
    # (или devicemapper). На ext4 Docker отказывается стартовать контейнер с этой опцией,
    # поэтому она по умолчанию отключена. Если у вас xfs+pquota — раскомментируйте:
    # storage_opt:
    #   size: "3G"
    #
    # На ext4 рост рантайма ограничивается косвенно:
    #  • tmpfs ниже не даёт Chromium-кэшу осесть на диск;
    #  • логи docker ограничены 5m × 3 ≈ 15 МБ;
    #  • папка ./data висит на хосте (cookies/tracks/pinned весят килобайты, logs ротируются ~15 МБ).

    # /tmp и /var/tmp в tmpfs, чтобы Chromium-кэш не рос на диске
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /var/tmp:size=256m,mode=1777

    # --- Healthcheck: heartbeat-файл обновляется ботом каждые 30с ---
    # «Здоров», если /data/heartbeat существует и был обновлён ≤ 120с назад.
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /data/heartbeat && [ $(($(date +%s) - $(stat -c %Y /data/heartbeat))) -lt 120 ]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

    # --- Логи docker: ~15 МБ суммарно (укладываемся в 3 ГБ с большим запасом) ---
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
